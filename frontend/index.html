<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Prediction</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="card">

            <h2>Text Prediction</h2>

            <!-- Input Area -->
            <textarea 
                id="textInput" 
                placeholder="Paste your text here..."
            ></textarea>

            <!-- Button -->
            <button id="predictBtn">
                Predict
            </button>

            <!-- Result Area -->
            <p id="result">
                Result will appear here
            </p>

        </div>

    </div>

    <!-- JavaScript -->
    <script src="./index.js">
    </script>

</body>
</html>
